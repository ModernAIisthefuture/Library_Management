{% extends 'base.html' %}

{% block content %}

<div class="delete-container">

    <div class="delete-card">

        <div class="delete-icon">
            🗑
        </div>

        <h2>Delete Book</h2>

        <p class="delete-text">
            Are you sure you want to delete this book?
        </p>

        <div class="book-name">
            "{{ object.title }}"
        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="delete-buttons">

                <button type="submit" class="delete-btn">
                    Yes, Delete
                </button>

                <a href="{% url 'book_list' %}" class="cancel-btn">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}

{% extends 'base.html' %}

{% block content %}

<div class="form-container">

    <div class="form-card">

        <div class="form-header">
            <h2>
                {% if object %}
                    ✏ Edit Book
                {% else %}
                    📚 Add New Book
                {% endif %}
            </h2>

            <p>
                Fill in the details below to save the book.
            </p>
        </div>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            {{ form.as_p }}

            <div class="form-buttons">

                <button type="submit" class="save-btn">
                    💾 Save Book
                </button>

                <a href="{% url 'book_list' %}" class="cancel-btn">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}

{% extends 'base.html' %}

{% block content %}

<div class="books-page">

    <div class="page-header">

        <div>
            <h1>📚 Library Books</h1>
            <p class="page-subtitle">
                Browse, search, borrow, and manage books.
            </p>
        </div>

        <a href="{% url 'book_create' %}" class="add-book-btn">
            + Add New Book
        </a>

    </div>

    <div class="search-card">

        <input
            type="text"
            name="q"
            class="search-input"
            placeholder="🔍 Search books by title..."
            hx-get="{% url 'search_books' %}"
            hx-target="#results"
            hx-trigger="keyup changed delay:400ms"
        >

    </div>

    <div id="results" class="table-card">

        {% include 'library/partials/search_results.html' %}

    </div>

</div>

{% endblock %}

<table class="book-table">

    <thead>
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Status</th>
            <th style="width:280px;">Actions</th>
        </tr>
    </thead>

    <tbody>

    {% for book in books %}

        <tr>

            <td>{{ book.title }}</td>

            <td>{{ book.author }}</td>

            <td>
                {% if book.available %}
                    <span class="status available">
                        Available
                    </span>
                {% else %}
                    <span class="status borrowed">
                        Borrowed by {{ book.borrower }}
                    </span>
                {% endif %}
            </td>

            <td>

                <div class="action-buttons">

                    <a href="{% url 'book_update' book.id %}" class="btn-action btn-edit">
                        ✏ Edit
                    </a>

                    <a href="{% url 'book_delete' book.id %}" class="btn-action btn-delete">
                        🗑 Delete
                    </a>

                    {% if book.available %}

                        <a href="{% url 'borrow_book' book.id %}" class="btn-action btn-borrow">
                            📖 Borrow
                        </a>

                    {% else %}

                        <a href="{% url 'return_book' book.id %}" class="btn-action btn-return">
                            ↩ Return
                        </a>

                    {% endif %}

                </div>

            </td>

        </tr>

    {% empty %}

        <tr>
            <td colspan="4" style="text-align:center;">
                No books found.
            </td>
        </tr>

    {% endfor %}

    </tbody>

</table>
